services:
  postgres:
    image: postgres:17
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: thermal
      POSTGRES_USER: thermal
      POSTGRES_PASSWORD: thermal

volumes:
  pgdata:
