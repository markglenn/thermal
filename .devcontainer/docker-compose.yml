services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
    command: sleep infinity
    environment:
      DATABASE_URL: postgres://thermal:thermal@postgres:5432/thermal
      AUTH_SECRET: thermal-dev-secret-do-not-use-in-production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  node_modules:
